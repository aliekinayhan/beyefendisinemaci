spring:
  datasource:
    url: jdbc:mysql://localhost:3306/beyefendisinemaci
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    web:
      pageable:
        default-page-size: 12

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000