spring:
  datasource:
    url: jdbc:mysql://localhost:3306/beyefendisinemaci
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    web:
      pageable:
        default-page-size: 12

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

tmdb:
  api-key: ${TMDB_API_KEY}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  bucket-name: ${AWS_BUCKET_NAME}
  region: ${AWS_REGION}
  cloudfront-url: ${CLOUDFRONT_URL}
